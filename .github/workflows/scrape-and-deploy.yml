name: Scrape & Deploy Dashboard

on:
  # Run daily at 8 AM MYT (Malaysia Time = UTC+8, so 00:00 UTC)
  schedule:
    - cron: '0 0 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
  # Also deploy on push to main (for code changes)
  push:
    branches: [main]

# Allow the workflow to write to the repo and deploy to Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: |
          cd scraper
          python scrape.py
        timeout-minutes: 15

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: update scraped data $(date -u +'%Y-%m-%d')"
            git push
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install & build dashboard
        run: |
          cd dashboard
          npm ci
          npm run build

      - name: Copy data to dist
        run: |
          mkdir -p dashboard/dist/data
          cp data/*.json dashboard/dist/data/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
